# 钢纤维混凝土抗裂预测 — 训练与 XGBoost 超参（train_model.py / 演示模型 bootstrap 共用）

training:
  test_size: 0.2
  random_state: 42
  # 样本很少或某类过少时 sklearn 会拒绝 stratify，脚本会自动退回普通随机划分
  stratify_risk: true

xgboost:
  regressor_width:
    n_estimators: 280
    max_depth: 5
    learning_rate: 0.06
    subsample: 0.88
    colsample_bytree: 0.88
    reg_lambda: 1.0
    min_child_weight: 1
  regressor_density:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.80
    colsample_bytree: 0.85
    reg_lambda: 2.0
    min_child_weight: 4
  classifier_risk:
    n_estimators: 280
    max_depth: 5
    learning_rate: 0.06
    subsample: 0.88
    colsample_bytree: 0.88
    reg_lambda: 1.0
    min_child_weight: 1
    objective: multi:softprob
    eval_metric: mlogloss
